syntax = "proto3";

package signaling.v1;

option go_package = "github.com/ayush00git/lowkey/proto/v1;signalingv1";

// Signaling service facilitates WebRTC negotiation between peers.
service Signaling {
  // Connect establishes a bidirectional stream for exchanging signaling messages.
  rpc Connect(stream SignalRequest) returns (stream SignalResponse);
}

// SignalRequest is a message sent from the client to the server.
message SignalRequest {
  oneof payload {
    Identity registration = 1;
    SdpExchange sdp = 2;
    IceCandidate ice = 3;
  }
}

// SignalResponse is a message sent from the server to the client.
message SignalResponse {
  oneof payload {
    Identity identity = 1;
    SdpExchange sdp = 2;
    IceCandidate ice = 3;
    Error error = 4;
  }
}

// Identity defines a peer's registration information.
message Identity {
  string uuid = 1;
  bytes public_key = 2;
}

// SdpExchange handles WebRTC Session Description Protocol (SDP) offers and answers.
message SdpExchange {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_OFFER = 1;
    TYPE_ANSWER = 2;
    TYPE_PRANSWER = 3;
    TYPE_ROLLBACK = 4;
  }
  Type type = 1;
  string sdp = 2;
  string target_uuid = 3;
}

// IceCandidate represents a WebRTC ICE candidate.
message IceCandidate {
  string candidate = 1;
  string sdp_mid = 2;
  int32 sdp_m_line_index = 3;
  string username_fragment = 4;
  string target_uuid = 5;
}

// Error represents a signaling error.
message Error {
  int32 code = 1;
  string message = 2;
}
