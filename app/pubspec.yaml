name: lowkey_app
description: "Lowkey — P2P encrypted chat"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.2
  flutter_webrtc: ^0.12.12
  shared_preferences: ^2.5.3
  pinenacl: ^0.6.0
  google_fonts: ^6.2.1
  provider: ^6.1.5
  uuid: ^4.5.1
  tor: ^0.1.1
  socks5_proxy: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.webp"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/logo.webp"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
