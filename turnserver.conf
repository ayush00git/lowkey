# Coturn TURN Server Configuration
# =================================
# IMPORTANT: Change these credentials before deploying to production!

# Listening settings
listening-port=3478
tls-listening-port=5349

# Realm (change to your domain)
realm=lowkey.local

# Authentication
lt-cred-mech

# Default user (change password in production!)
user=lowkey:lowkey-turn-secret

# Logging
log-file=/var/log/turnserver.log
verbose

# Fingerprint for STUN
fingerprint

# Disable TCP relay (UDP is preferred for WebRTC)
no-tcp-relay

# Limit allocations per user
user-quota=12
total-quota=1200
